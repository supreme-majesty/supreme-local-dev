<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supreme Local Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      .card {
        background-color: #1e293b;
        border-radius: 0.75rem;
        padding: 1.5rem;
        border: 1px solid #334155;
      }
      .btn {
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-weight: 500;
        transition: all 0.2s;
      }
      .btn-primary {
        background-color: #3b82f6;
        color: white;
      }
      .btn-primary:hover {
        background-color: #2563eb;
      }
      .btn-danger {
        background-color: #ef4444;
        color: white;
        font-size: 0.875rem;
      }
      .btn-danger:hover {
        background-color: #dc2626;
      }
      input {
        background-color: #334155;
        border: 1px solid #475569;
        color: white;
        padding: 0.5rem;
        border-radius: 0.5rem;
        width: 100%;
      }
      input:focus {
        outline: none;
        border-color: #3b82f6;
      }
    </style>
  </head>
  <body class="p-8 max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-8">
      <div>
        <h1
          class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent"
        >
          Supreme Local Dev
        </h1>
        <p class="text-slate-400">High-performance environment</p>
      </div>
      <div id="status" class="flex gap-4">
        <!-- Status badges injected here -->
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Services Card -->
      <div class="card">
        <h2 class="text-xl font-bold mb-4">Core Services</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm text-slate-400 mb-1">PHP Version</label>
            <div class="flex gap-2">
              <input
                type="text"
                id="phpVersionInput"
                placeholder="e.g. 8.2"
                class="flex-1"
              />
              <button onclick="switchPHP()" class="btn btn-primary">
                Switch
              </button>
            </div>
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">HTTPS</label>
            <div
              class="flex items-center justify-between bg-slate-800 p-3 rounded"
            >
              <span id="httpsStatus">Checking...</span>
              <button onclick="enableHTTPS()" class="btn btn-primary text-sm">
                Enable Globally
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Parked Paths Card -->
      <div class="card">
        <h2 class="text-xl font-bold mb-4">Parked Paths</h2>
        <div class="flex gap-2 mb-4">
          <input type="text" id="parkInput" placeholder="/path/to/projects" />
          <button onclick="parkPath()" class="btn btn-primary">Park</button>
        </div>
        <ul id="pathsList" class="space-y-2">
          <!-- List items injected here -->
        </ul>
      </div>
    </div>

    <!-- Toast -->
    <div
      id="toast"
      class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded shadow-lg transform translate-y-20 transition-transform opacity-0"
    ></div>

    <script>
      const API = "http://localhost:2025/api";

      async function fetchState() {
        try {
          const res = await fetch(`${API}/state`);
          const state = await res.json();
          render(state);
        } catch (e) {
          console.error("Failed to connect to SLD Daemon", e);
          showToast("Daemon not running?", true);
        }
      }

      function render(state) {
        // PHP Version
        document.getElementById("phpVersionInput").value =
          state.php_version || "";

        // HTTPS
        const httpsStatus = document.getElementById("httpsStatus");
        httpsStatus.textContent = state.secure ? "✅ Enabled" : "❌ Disabled";

        // Paths
        const list = document.getElementById("pathsList");
        list.innerHTML = "";
        state.paths.forEach((path) => {
          const li = document.createElement("li");
          li.className =
            "flex justify-between items-center bg-slate-800 p-2 rounded text-sm";
          li.innerHTML = `
                    <span class="truncate" title="${path}">${path}</span>
                    <button onclick="forgetPath('${path}')" class="btn btn-danger ml-2">Forget</button>
                `;
          list.appendChild(li);
        });
      }

      async function parkPath() {
        const path = document.getElementById("parkInput").value;
        if (!path) return;
        await post("/park", { path });
        document.getElementById("parkInput").value = "";
        fetchState();
      }

      async function forgetPath(path) {
        if (!confirm("Forget this path?")) return;
        await post("/forget", { path });
        fetchState();
      }

      async function switchPHP() {
        const version = document.getElementById("phpVersionInput").value;
        if (!version) return;
        showToast("Switching PHP...");
        await post("/php", { version });
        fetchState();
        showToast("PHP Switched!");
      }

      async function enableHTTPS() {
        showToast("Enabling HTTPS... (this may take a moment)");
        await post("/secure", {});
        fetchState();
        showToast("HTTPS Enabled!");
      }

      async function post(endpoint, data) {
        const res = await fetch(`${API}${endpoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        return res.json();
      }

      function showToast(msg, error = false) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded shadow-lg transform transition-transform ${
          error ? "bg-red-600" : "bg-green-600"
        }`;
        toast.style.opacity = "1";
        toast.style.transform = "translateY(0)";
        setTimeout(() => {
          toast.style.transform = "translateY(5rem)";
          toast.style.opacity = "0";
        }, 3000);
      }

      // Init
      fetchState();
    </script>
  </body>
</html>
